<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>儒意 · RU STUDIO — 向历史借灵感，为当代造美物</title>
    <meta name="description" content="儒意 RU STUDIO — 儒家文化创意工作室。致力于构建儒家文化阐释第一品牌。" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>儒</text></svg>" />

    <style>
      /* Critical CSS to prevent FOUC */
      html { background-color: #0A0A0A; }
      body {
        margin: 0;
        background-color: #0A0A0A;
        color: #F5F2EB;
        font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Hide content until fonts load */
      .fonts-loading body { visibility: hidden; }
      .fonts-loaded body { visibility: visible; }
    </style>

    <script>
      // Font loading detection
      document.documentElement.classList.add('fonts-loading');
      if (document.fonts) {
        document.fonts.ready.then(function() {
          document.documentElement.classList.remove('fonts-loading');
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        document.documentElement.classList.remove('fonts-loading');
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
